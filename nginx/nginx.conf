# Reverse proxy that terminates TLS and forces HTTPS on every entry port.
#   :80    plain HTTP        -> 301 https://<host>/…            (canonical 443)
#   :443   HTTPS             -> app       (plain HTTP here also 301s to HTTPS)
#   :3000  HTTPS (dev habit) -> app       (plain http://…:3000 also 301s to HTTPS)
# The app itself is the Vite dev server, reachable as frontend:3000 inside the
# compose network (it also proxies /api and /ws to the backend).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;
    # $host drops the port, so any :PORT HTTP hit lands on canonical HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    client_max_body_size 60m;

    # A plain-HTTP request sent to this TLS port -> redirect to HTTPS.
    error_page 497 =301 https://$host$request_uri;

    location / {
        proxy_pass https://frontend:3000;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 3000 ssl;
    listen [::]:3000 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    client_max_body_size 60m;

    # http://localhost:3000 -> https://localhost:3000 (keep the :3000 dev URL).
    error_page 497 =301 https://$host:3000$request_uri;

    location / {
        proxy_pass https://frontend:3000;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
