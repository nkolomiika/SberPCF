services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - db
      - minio
      - clickhouse
      - rabbitmq
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  mail-worker:
    build:
      context: ./backend
    env_file:
      - .env
    command: python -m app.worker.mail_worker
    depends_on:
      - db
      - rabbitmq
      - mailpit
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pcf
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: pcf
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    ports:
      - "8123:8123"
    volumes:
      - clickhousedata:/var/lib/clickhouse

  rabbitmq:
    image: rabbitmq:3-management

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  miniodata:
  clickhousedata:
