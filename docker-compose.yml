services:
  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      COOKIE_SECURE: "true"
      BACKEND_CORS_ORIGINS: "https://localhost:3000,https://127.0.0.1:3000"
      CSRF_ALLOWED_ORIGINS: "https://localhost:3000,https://127.0.0.1:3000"
    depends_on:
      - db
      - minio
      - clickhouse
      - rabbitmq
    volumes:
      - ./backend:/app
      - ./:/workspace
      - ./:/workspace

  mail-worker:
    build:
      context: ./backend
    env_file:
      - .env
    command: python -m app.worker.mail_worker
    depends_on:
      db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      mailpit:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./:/workspace

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pcf
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: pcf
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse_dev_password
    ports:
      - "8123:8123"
    volumes:
      - clickhousedata:/var/lib/clickhouse

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_ERLANG_COOKIE: pcf_rabbitmq_dev_cookie_1234567890
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  miniodata:
  clickhousedata:
