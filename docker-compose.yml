services:
  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # Порт наружу — чтобы Swagger (/docs, /api/v2/docs) был доступен с хоста.
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      COOKIE_SECURE: "true"
      # BACKEND_CORS_ORIGINS / CSRF_ALLOWED_ORIGINS намеренно НЕ задаём здесь:
      # значения из environment перекрывают env_file, и правки .env молча не
      # применялись бы. Единственный источник истины — .env.
    depends_on:
      - db
      - minio
      - rabbitmq
    volumes:
      - ./backend:/app
      - ./:/workspace
      - ./:/workspace

  mail-worker:
    build:
      context: ./backend
    env_file:
      - .env
    command: python -m app.worker.mail_worker
    depends_on:
      db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      mailpit:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./:/workspace

  # Рекон-ферма: пробив вставленных списков хостов и IP. Отдельный процесс —
  # это минуты сетевого ожидания, которым нечего делать в воркерах uvicorn.
  recon-worker:
    build:
      context: ./backend
    env_file:
      - .env
    command: python -m app.worker.recon_worker
    depends_on:
      db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./:/workspace

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    command: sh -c "npm install && npm run dev"
    # Not exposed on the host directly; nginx fronts it (see the nginx service).
    expose:
      - "3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pcf
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_ERLANG_COOKIE: pcf_rabbitmq_dev_cookie_1234567890
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/conf.d/99-local.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  # TLS-terminating reverse proxy: 80 -> 301 https, 443 -> app.
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
      - "3000:3000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/gen-cert.sh:/docker-entrypoint.d/10-gen-cert.sh:ro

volumes:
  pgdata:
  miniodata:
